# validation: k8s-only change to test build skip

---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: mcp
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: mcp
  strategy:
    blueGreen:
      activeService: mcp
      previewService: mcp-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
      previewReplicaCount: 1
  template:
    metadata:
      labels:
        app: mcp
    spec:
      containers:
        - name: mcp
          image: ghcr.io/prefeitura-rio/app-mcp-server:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: mcp-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      restartPolicy: Always

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mcp-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mcp

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: mcp
spec:
  selector:
    app: mcp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-preview
spec:
  selector:
    app: mcp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

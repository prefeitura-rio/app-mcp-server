---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: mcp
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: mcp
  strategy:
    canary:
      stableService: mcp
      canaryService: mcp-canary
      maxSurge: 1
      maxUnavailable: 0
      abortScaleDownDelaySeconds: 30
      steps:
        - setWeight: 25
        - pause:
            duration: 5m
        - setWeight: 50
        - pause:
            duration: 10m
        - setWeight: 100
  template:
    metadata:
      labels:
        app: mcp
    spec:
      containers:
        - name: mcp
          image: ghcr.io/prefeitura-rio/app-mcp-server:stable
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: mcp-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      restartPolicy: Always

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mcp-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mcp

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: mcp
spec:
  selector:
    app: mcp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-canary
spec:
  selector:
    app: mcp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

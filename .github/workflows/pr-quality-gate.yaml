name: PR Quality Gate

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

concurrency:
  group: pr-quality-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect lint targets
        id: detect
        run: |
          if [ -f Dockerfile ]; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run hadolint (Dockerfile)
        if: steps.detect.outputs.has_dockerfile == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run Ruff lint
        run: uvx ruff check .

      - name: Run Ruff format check
        run: uvx ruff format --check .

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy filesystem scan (SARIF)
        run: trivy fs --format sarif --output trivy-fs.sarif --severity HIGH,CRITICAL .

      - name: Upload Trivy FS SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  test:
    name: Tests + Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    outputs:
      coverage: ${{ steps.coverage.outputs.coverage }}
      baseline: ${{ steps.coverage.outputs.baseline }}
      delta: ${{ steps.coverage.outputs.delta }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests with coverage
        env:
          VALID_TOKENS: test-token
          WORKFLOWS_GCP_SERVICE_ACCOUNT: test-workflows-sa
          WORKFLOWS_GCS_BUCKET: test-workflows-bucket
          GEMINI_API_KEY: test-gemini-key
          GEMINI_MODEL: gemini-2.5-flash
          GOOGLE_MAPS_API_URL: https://maps.googleapis.com/maps/api/geocode/json
          GOOGLE_MAPS_API_KEY: test-google-key
          SHORT_API_URL: https://test.short.local
          SHORT_API_TOKEN: test-short-token
          GCP_SERVICE_ACCOUNT_CREDENTIALS: e30=
          NOMINATIM_API_URL: https://nominatim.openstreetmap.org/search
          ERROR_INTERCEPTOR_URL: https://test.interceptor.local/api
          ERROR_INTERCEPTOR_TOKEN: test-interceptor-token
          IPTU_API_URL: https://test.iptu.local/api
          IPTU_API_TOKEN: test-iptu-token
          WA_IPTU_URL: https://test.wa-iptu.local/api
          WA_IPTU_TOKEN: test-wa-iptu-token
          WA_IPTU_PUBLIC_KEY: test-wa-iptu-public-key
          DIVIDA_ATIVA_API_URL: https://test.divida.local/api
          DIVIDA_ATIVA_ACCESS_KEY: test-divida-access-key
          REDIS_URL: redis://localhost:6379/0
          REDIS_TTL_SECONDS: "3600"
          PROXY_URL: https://test.proxy.local
          SGRC_URL: https://test.sgrc.local/api
          SGRC_AUTHORIZATION_HEADER: test-sgrc-auth
          SGRC_BODY_TOKEN: test-sgrc-body-token
          GMAPS_API_TOKEN: test-gmaps-token
          DATA_DIR: /tmp
          TYPESENSE_PARAMETERS: none
          MONGODB_URL: mongodb://localhost:27017
        run: uv run pytest --junitxml=pytest.xml --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload pytest report artifact
        if: always() && hashFiles('pytest.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest.xml

      - name: Coverage baseline gate (tolerance 0.1%)
        id: coverage
        run: |
          python - <<'PY'
          import json
          import os
          import xml.etree.ElementTree as ET

          tolerance = 0.1
          minimum_coverage = 50.0
          baseline_path = ".github/coverage-baseline.json"
          xml_path = "coverage.xml"

          tree = ET.parse(xml_path)
          root = tree.getroot()
          current = float(root.attrib["line-rate"]) * 100.0

          with open(baseline_path, "r", encoding="utf-8") as f:
              baseline = float(json.load(f)["total"])

          delta = current - baseline

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"coverage={current:.2f}\n")
              out.write(f"baseline={baseline:.2f}\n")
              out.write(f"delta={delta:.2f}\n")
              out.write(f"minimum={minimum_coverage:.2f}\n")

          print(f"Current coverage: {current:.2f}%")
          print(f"Baseline coverage: {baseline:.2f}%")
          print(f"Minimum required coverage: {minimum_coverage:.2f}%")
          print(f"Delta: {delta:.2f} pp")

          if current < minimum_coverage:
              raise SystemExit(
                  f"Coverage is {current:.2f}%, below the minimum required threshold of {minimum_coverage:.1f}%."
              )

          if delta < -tolerance:
              raise SystemExit(
                  f"Coverage dropped by {-delta:.2f} pp, exceeding tolerance of {tolerance:.1f} pp."
              )
          PY

      - name: Upload coverage.xml artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build Dry Run + Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint
      - security-scan
      - test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build image (dry-run, local only)
        run: docker buildx build --load -t app-mcp-server:pr-${{ github.sha }} .

      - name: Run Trivy image scan (SARIF)
        run: trivy image --format sarif --output trivy-image.sarif --severity HIGH,CRITICAL app-mcp-server:pr-${{ github.sha }}

      - name: Upload Trivy image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  pr-summary:
    name: PR Summary Comment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && github.event_name == 'pull_request'
    needs:
      - lint
      - security-scan
      - test
      - build

    steps:
      - name: Create or update PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const formatStatus = (result) => {
              if (result === "success") return "Passed";
              if (result === "failure") return "Failed";
              if (result === "cancelled") return "Cancelled";
              if (result === "skipped") return "Skipped";
              return result || "Unknown";
            };

            const coverageCurrent = `${{ toJSON(needs.test.outputs.coverage) }}`;
            const coverageBaseline = `${{ toJSON(needs.test.outputs.baseline) }}`;
            const coverageDelta = `${{ toJSON(needs.test.outputs.delta) }}`;
            const coverageMinimum = "50.00";

            const formatCoverageDelta = (delta) => {
              const numeric = Number(delta);
              if (Number.isNaN(numeric)) return delta;
              const signal = numeric >= 0 ? "+" : "";
              return `${signal}${numeric.toFixed(2)}`;
            };

            const coverageStatus = (current, baseline, minimum) => {
              const currentNumber = Number(current);
              const baselineNumber = Number(baseline);
              const minimumNumber = Number(minimum);
              if ([currentNumber, baselineNumber, minimumNumber].some(Number.isNaN)) {
                return "Unknown";
              }
              if (currentNumber < minimumNumber) return "Failed";
              if (currentNumber + 0.1 < baselineNumber) return "Failed";
              return "Passed";
            };

            const hasCoverage =
              coverageCurrent !== "" &&
              coverageCurrent !== "null" &&
              coverageBaseline !== "" &&
              coverageBaseline !== "null" &&
              coverageDelta !== "" &&
              coverageDelta !== "null";

            const coverageBlock = hasCoverage
              ? [
                  "### 📊 Coverage",
                  `- Current: \`${coverageCurrent}%\``,
                  `- Baseline: \`${coverageBaseline}%\``,
                  `- Minimum: \`${coverageMinimum}%\``,
                  `- Delta: \`${formatCoverageDelta(coverageDelta)} pp\``,
                  `- Status: **${coverageStatus(coverageCurrent, coverageBaseline, coverageMinimum)}**`,
                ].join("\n")
              : [
                  "### 📊 Coverage",
                  "- Coverage data was not produced for this run.",
                ].join("\n");

            const allPassed =
              "${{ needs.lint.result }}" === "success" &&
              "${{ needs['security-scan'].result }}" === "success" &&
              "${{ needs.test.result }}" === "success" &&
              "${{ needs.build.result }}" === "success";

            const marker = "<!-- pr-quality-gate-summary -->";
            const body = `${marker}
            ## 🚦 PR Quality Gate Summary

            | Check | Result |
            |---|---|
            | Lint | ${formatStatus("${{ needs.lint.result }}")} |
            | Security Scan | ${formatStatus("${{ needs['security-scan'].result }}")} |
            | Tests + Coverage | ${formatStatus("${{ needs.test.result }}")} |
            | Build + Image Scan | ${formatStatus("${{ needs.build.result }}")} |

            ${coverageBlock}

            ---

            ${allPassed
              ? "### ✅ All quality checks passed"
              : "### ❌ Quality gate failed"}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const previous = comments.find(
              (c) => c.user.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
